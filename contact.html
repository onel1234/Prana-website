   <!-- Contact Form Submission -->
   <script>
   (function() {
      var form = document.getElementById('contact-form');
      var btn = document.getElementById('send-btn');
      var statusDiv = document.getElementById('form-status');

      function showStatus(message, isSuccess) {
         statusDiv.textContent = message;
         statusDiv.style.display = 'block';
         statusDiv.style.background = isSuccess ? '#e8f5e9' : '#fdecea';
         statusDiv.style.color = isSuccess ? '#1a5c38' : '#c0392b';
         statusDiv.style.border = '1px solid ' + (isSuccess ? '#a5d6a7' : '#f5c6cb');
      }

      form.addEventListener('submit', function(e) {
         e.preventDefault();
         statusDiv.style.display = 'none';

         var fullName = document.getElementById('fullName').value.trim();
         var email = document.getElementById('email').value.trim();
         var phone = document.getElementById('phone').value.trim();
         var message = document.getElementById('message').value.trim();

         if (!fullName || !email || !message) {
            showStatus('Please fill in your name, email, and message.', false);
            return;
         }

         btn.disabled = true;
         btn.textContent = 'Sending...';

         fetch('/.netlify/functions/send-contact-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
               fullName: fullName,
               email: email,
               phone: phone,
               message: message
            })
         })
         .then(function(res) { return res.json(); })
         .then(function(data) {
            if (data.success) {
               showStatus('✅ Your message has been sent successfully! We\'ll get back to you soon.', true);
               form.reset();
            } else {
               showStatus('❌ ' + (data.error || 'Something went wrong. Please try again.'), false);
            }
         })
         .catch(function() {
            showStatus('❌ Network error. Please check your connection and try again.', false);
         })
         .finally(function() {
            btn.disabled = false;
            btn.textContent = 'Send';
         });
      });
   })();
   </script>
