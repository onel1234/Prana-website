<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Admin Login | PRANA</title>
   <meta name="robots" content="noindex, nofollow">
   <link rel="icon" href="../images/prana_logo-removebg-preview.png" type="image/png">
   <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">

   <div class="login-card">
      <div class="login-logo">
         <img src="../images/prana_logo-removebg-preview.png" alt="PRANA">
      </div>
      <h1 class="login-title">Admin Portal</h1>
      <p class="login-subtitle">Sign in to manage orders and users</p>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" onsubmit="handleLogin(event)">
         <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="admin@prana.com" required autocomplete="email">
         </div>
         <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
         </div>
         <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      </form>
   </div>

   <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
   <script src="../js/supabase-config.js"></script>
   <script src="js/admin.js"></script>

</body>
</html>
